<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Analyzer — Select Language</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0c0d14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Card central */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
      text-align: center;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #1a7a4a, #6fcf97);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-name {
      font-size: 22px;
      font-weight: 800;
      color: #111;
      letter-spacing: -.5px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13.5px;
      color: #888;
      margin-bottom: 28px;
    }

    /* Grid de idiomas */
    .lang-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .lang-btn {
      background: #f5f5f7;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 13px 10px;
      font-size: 14px;
      font-weight: 600;
      color: #111;
      cursor: pointer;
      transition: all .15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .lang-btn:hover {
      background: #eaf5ef;
      border-color: #1a7a4a;
      color: #1a7a4a;
    }
    .lang-btn.selected {
      background: #1a7a4a;
      border-color: #1a7a4a;
      color: #fff;
    }
    .lang-flag {
      font-size: 18px;
      line-height: 1;
    }

    /* Botão continuar */
    .continue-btn {
      width: 100%;
      padding: 14px;
      background: #1a7a4a;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      opacity: .45;
      pointer-events: none;
    }
    .continue-btn.enabled {
      opacity: 1;
      pointer-events: auto;
    }
    .continue-btn.enabled:hover { background: #15623c; }

    .powered {
      margin-top: 18px;
      font-size: 11px;
      color: #bbb;
    }
    .powered a { color: #1a7a4a; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <span class="logo-name">SEO Analyzer</span>
    </div>

    <h1>Select Language</h1>
    <p class="subtitle">Choose your preferred language for the extension interface.</p>

    <!-- Grid de idiomas -->
    <div class="lang-grid">
      <button class="lang-btn" data-lang="en" data-label="English">
        <span class="lang-flag">🇺🇸</span> English
      </button>
      <button class="lang-btn" data-lang="zh" data-label="中文">
        <span class="lang-flag">🇨🇳</span> 中文
      </button>
      <button class="lang-btn" data-lang="ko" data-label="한국어">
        <span class="lang-flag">🇰🇷</span> 한국어
      </button>
      <button class="lang-btn" data-lang="ja" data-label="日本語">
        <span class="lang-flag">🇯🇵</span> 日本語
      </button>
      <button class="lang-btn" data-lang="th" data-label="ภาษาไทย">
        <span class="lang-flag">🇹🇭</span> ภาษาไทย
      </button>
      <button class="lang-btn" data-lang="vi" data-label="Tiếng Việt">
        <span class="lang-flag">🇻🇳</span> Tiếng Việt
      </button>
      <button class="lang-btn" data-lang="id" data-label="Indonesia">
        <span class="lang-flag">🇮🇩</span> Indonesia
      </button>
      <button class="lang-btn" data-lang="ms" data-label="Melayu">
        <span class="lang-flag">🇲🇾</span> Melayu
      </button>
      <button class="lang-btn" data-lang="de" data-label="Deutsch">
        <span class="lang-flag">🇩🇪</span> Deutsch
      </button>
      <button class="lang-btn" data-lang="es" data-label="Español">
        <span class="lang-flag">🇪🇸</span> Español
      </button>
      <button class="lang-btn" data-lang="pt" data-label="Português">
        <span class="lang-flag">🇧🇷</span> Português
      </button>
      <button class="lang-btn" data-lang="fr" data-label="Français">
        <span class="lang-flag">🇫🇷</span> Français
      </button>
    </div>

    <button class="continue-btn" id="continue-btn">Continue →</button>

    <p class="powered">Powered by <a href="https://maturare.com.br" target="_blank">Maturare</a> · You can change this later in Config</p>
  </div>

  <script>
    let selectedLang = null;

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedLang = btn.dataset.lang;
        document.getElementById('continue-btn').classList.add('enabled');
      });
    });

    document.getElementById('continue-btn').addEventListener('click', () => {
      if (!selectedLang) return;
      chrome.storage.sync.set({ seo_language: selectedLang, seo_onboarding_done: true }, () => {
        // Fechar esta aba e ativar o side panel
        chrome.tabs.getCurrent(tab => {
          if (tab) chrome.tabs.remove(tab.id);
        });
      });
    });
  </script>
</body>
</html>
